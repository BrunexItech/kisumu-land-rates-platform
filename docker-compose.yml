services:
  backend:
    build: ./backend
    container_name: kisumu-backend
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=your_super_secret_key_here
      - DATABASE_URL=postgresql://kisumu_user:secure_password_here@postgres:5432/kisumu_rates
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: kisumu-frontend
    ports:
      - "8085:80"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: kisumu-postgres
    environment:
      - POSTGRES_DB=kisumu_rates
      - POSTGRES_USER=kisumu_user
      - POSTGRES_PASSWORD=secure_password_here
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: