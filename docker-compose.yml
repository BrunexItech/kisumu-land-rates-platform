version: '3.8'

services:
  backend:
    build: ./backend
    container_name: kisumu-backend
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=your_super_secret_key_here
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: kisumu-frontend
    ports:
      - "8085:80"
    depends_on:
      - backend
    restart: unless-stopped
